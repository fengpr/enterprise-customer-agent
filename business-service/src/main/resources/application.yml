server:
  port: 8081

spring:
  application:
    name: business-service
  datasource:
    url: jdbc:sqlite:./data/business-service.db
    driver-class-name: org.sqlite.JDBC
    username:
    password:
  # SQLite 是已有本地开发库，表结构仍由本地初始化逻辑维护，不能执行 PostgreSQL Flyway 脚本。
  flyway:
    enabled: false

logging:
  level:
    com.example.business: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: business-service
